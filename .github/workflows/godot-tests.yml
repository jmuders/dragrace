name: Godot Tests

on:
  push:
    branches: [main, "claude/**"]
    paths: ["godot/**"]
  pull_request:
    branches: [main]
    paths: ["godot/**"]

jobs:
  test:
    name: Run GUT tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: /tmp/godot-bin
          key: godot-4.6-stable-linux-x86_64

      - name: Download Godot 4.6
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -fsSL \
            "https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip" \
            -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot-bin
          chmod +x "/tmp/godot-bin/Godot_v4.6-stable_linux.x86_64"

      - name: Add Godot to PATH
        run: echo "/tmp/godot-bin" >> $GITHUB_PATH

      - name: Cache project import data
        uses: actions/cache@v4
        id: cache-import
        with:
          path: godot/.godot
          key: godot-import-${{ hashFiles('godot/project.godot', 'godot/addons/**', 'godot/scripts/**') }}
          restore-keys: godot-import-

      - name: Import project resources
        if: steps.cache-import.outputs.cache-hit != 'true'
        run: |
          Godot_v4.6-stable_linux.x86_64 \
            --headless --path godot/ --editor --quit 2>&1 || true

      - name: Run GUT tests
        run: |
          Godot_v4.6-stable_linux.x86_64 \
            --headless --path godot/ \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=res://.gutconfig.json \
            -gexit
