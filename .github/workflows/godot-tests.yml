name: Godot Tests

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "godot/**"
  pull_request:
    branches: [main]
    paths:
      - "godot/**"

jobs:
  test:
    name: Run GUT tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Godot 4.3 headless
        run: |
          curl -fsSL \
            "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip" \
            -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.3-stable_linux.x86_64
          echo "/tmp/godot" >> $GITHUB_PATH

      - name: Import project resources
        run: |
          Godot_v4.3-stable_linux.x86_64 \
            --headless --path godot/ --import --quit || true

      - name: Run GUT tests
        run: |
          Godot_v4.3-stable_linux.x86_64 \
            --headless --path godot/ \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=.gutconfig.json \
            -gexit
